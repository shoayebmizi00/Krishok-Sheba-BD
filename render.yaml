services:
  - type: web
    name: krishok-sheba-bd
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://krishok-sheba-bd.vercel.app
      - key: PUBLIC_BASE_URL
        value: https://krishok-sheba-bd.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: DB_CONNECTION_LIMIT
        value: "5"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: DB_QUERY_TIMEOUT_MS
        value: "30000"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "30000"
      - key: STARTUP_STAGE_TIMEOUT_MS
        value: "120000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RESET_TOKEN_EXPIRES_MINUTES
        value: "30"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: MAX_UPLOAD_MB
        value: "5"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
